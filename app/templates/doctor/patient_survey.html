{% extends 'base.html' %}

{% block title %}Register New Patient - Smart Hospital{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0"><i class="fas fa-user-plus me-2"></i>Register New Patient & Medical Survey</h4>
        </div>
        <div class="card-body">
            <form method="POST" action="{{ url_for('doctor.register_patient') }}" id="patientForm">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                
                <div class="row">
                    <!-- Basic Information -->
                    <div class="col-lg-6">
                        <h5 class="text-primary mb-3"><i class="fas fa-user me-2"></i>Basic Information</h5>
                        
                        <div class="mb-3">
                            <label for="full_name" class="form-label">Full Name *</label>
                            <input type="text" class="form-control" id="full_name" name="full_name" required>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="age" class="form-label">Age *</label>
                                <input type="number" class="form-control" id="age" name="age" min="0" max="150" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="gender" class="form-label">Gender *</label>
                                <select class="form-select" id="gender" name="gender" required>
                                    <option value="">Select</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="blood_group" class="form-label">Blood Group</label>
                                <select class="form-select" id="blood_group" name="blood_group">
                                    <option value="">Select</option>
                                    <option value="A+">A+</option>
                                    <option value="A-">A-</option>
                                    <option value="B+">B+</option>
                                    <option value="B-">B-</option>
                                    <option value="AB+">AB+</option>
                                    <option value="AB-">AB-</option>
                                    <option value="O+">O+</option>
                                    <option value="O-">O-</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="phone" class="form-label">Phone Number *</label>
                            <input type="tel" class="form-control" id="phone" name="phone" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email">
                        </div>
                        
                        <div class="mb-3">
                            <label for="address" class="form-label">Address</label>
                            <textarea class="form-control" id="address" name="address" rows="2"></textarea>
                        </div>
                        
                        <h5 class="text-info mt-4 mb-3"><i class="fas fa-phone-alt me-2"></i>Emergency Contact</h5>
                        
                        <div class="mb-3">
                            <label for="emergency_contact_name" class="form-label">Contact Name</label>
                            <input type="text" class="form-control" id="emergency_contact_name" name="emergency_contact_name">
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="emergency_contact_phone" class="form-label">Contact Phone</label>
                                <input type="tel" class="form-control" id="emergency_contact_phone" name="emergency_contact_phone">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="emergency_contact_relation" class="form-label">Relationship</label>
                                <select class="form-select" id="emergency_contact_relation" name="emergency_contact_relation">
                                    <option value="">Select</option>
                                    <option value="Spouse">Spouse</option>
                                    <option value="Parent">Parent</option>
                                    <option value="Child">Child</option>
                                    <option value="Sibling">Sibling</option>
                                    <option value="Friend">Friend</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Medical Survey -->
                    <div class="col-lg-6">
                        <h5 class="text-danger mb-3"><i class="fas fa-heartbeat me-2"></i>Medical Survey</h5>
                        
                        <!-- Allergies -->
                        <div class="mb-4">
                            <label class="form-label fw-bold">Known Allergies</label>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" name="allergies" value="Penicillin" id="allergy1">
                                        <label class="form-check-label" for="allergy1">Penicillin</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" name="allergies" value="Sulfa Drugs" id="allergy2">
                                        <label class="form-check-label" for="allergy2">Sulfa Drugs</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" name="allergies" value="Aspirin" id="allergy3">
                                        <label class="form-check-label" for="allergy3">Aspirin</label>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" name="allergies" value="Ibuprofen" id="allergy4">
                                        <label class="form-check-label" for="allergy4">Ibuprofen</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" name="allergies" value="Latex" id="allergy5">
                                        <label class="form-check-label" for="allergy5">Latex</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" name="allergies" value="Codeine" id="allergy6">
                                        <label class="form-check-label" for="allergy6">Codeine</label>
                                    </div>
                                </div>
                            </div>
                            <input type="text" class="form-control mt-2" name="custom_allergies" 
                                   placeholder="Other allergies (comma separated)">
                        </div>
                        
                        <!-- Existing Conditions -->
                        <div class="mb-4">
                            <label class="form-label fw-bold">Existing Conditions</label>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" name="conditions" value="Diabetes" id="cond1">
                                        <label class="form-check-label" for="cond1">Diabetes</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" name="conditions" value="Hypertension" id="cond2">
                                        <label class="form-check-label" for="cond2">Hypertension</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" name="conditions" value="Asthma" id="cond3">
                                        <label class="form-check-label" for="cond3">Asthma</label>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" name="conditions" value="Heart Disease" id="cond4">
                                        <label class="form-check-label" for="cond4">Heart Disease</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" name="conditions" value="Kidney Disease" id="cond5">
                                        <label class="form-check-label" for="cond5">Kidney Disease</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" name="conditions" value="Thyroid" id="cond6">
                                        <label class="form-check-label" for="cond6">Thyroid</label>
                                    </div>
                                </div>
                            </div>
                            <input type="text" class="form-control mt-2" name="custom_conditions" 
                                   placeholder="Other conditions (comma separated)">
                        </div>
                        
                        <!-- Lifestyle -->
                        <h5 class="text-warning mb-3"><i class="fas fa-smoking me-2"></i>Lifestyle</h5>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Smoking Status</label>
                                <select class="form-select" name="smoking_status">
                                    <option value="never">Never</option>
                                    <option value="former">Former Smoker</option>
                                    <option value="current">Current Smoker</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Alcohol Consumption</label>
                                <select class="form-select" name="alcohol_consumption">
                                    <option value="never">Never</option>
                                    <option value="occasional">Occasional</option>
                                    <option value="regular">Regular</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Food Preference</label>
                                <select class="form-select" name="food_preference">
                                    <option value="non-vegetarian">Non-Vegetarian</option>
                                    <option value="vegetarian">Vegetarian</option>
                                    <option value="vegan">Vegan</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Exercise Frequency</label>
                                <select class="form-select" name="exercise_frequency">
                                    <option value="none">None</option>
                                    <option value="occasional">Occasional</option>
                                    <option value="regular">Regular</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="current_medications" class="form-label">Current Medications</label>
                            <textarea class="form-control" id="current_medications" name="current_medications" 
                                      rows="2" placeholder="List any current medications (comma separated)"></textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label for="notes" class="form-label">Additional Notes</label>
                            <textarea class="form-control" id="notes" name="notes" rows="2" 
                                      placeholder="Any other relevant medical information"></textarea>
                        </div>
                    </div>
                </div>
                
                <hr>
                
                <div class="d-flex justify-content-end gap-2">
                    <a href="{{ url_for('doctor.dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="fas fa-save me-2"></i>Register Patient
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
