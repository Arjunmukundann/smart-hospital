{% extends 'base.html' %}

{% block title %}Server Error - Smart Hospital{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="error-page">
                <h1 class="display-1 text-danger fw-bold">500</h1>
                <i class="fas fa-server fa-5x text-danger mb-4"></i>
                <h2 class="mb-3">Internal Server Error</h2>
                <p class="text-muted mb-4">
                    Something went wrong on our end. 
                    Please try again later or contact support if the problem persists.
                </p>
                <a href="{{ url_for('auth.index') }}" class="btn btn-primary btn-lg">
                    <i class="fas fa-home me-2"></i>Go to Home
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
